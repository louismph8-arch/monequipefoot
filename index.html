<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonEquipeFoot</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C853;
    --green-dim: #00a844;
    --dark: #0a0f0d;
    --dark2: #111a14;
    --dark3: #182018;
    --card: #1a2420;
    --border: rgba(0,200,83,0.15);
    --text: #e8f0eb;
    --text-muted: #7a9485;
    --danger: #ff4444;
    --yellow: #ffd600;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* FIELD PATTERN BG */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(0,200,83,0.03) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(0,200,83,0.03) 60px);
    pointer-events:none;
    z-index:0;
  }

  /* AUTH */
  #auth-screen {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background: var(--dark);
  }

  .auth-box {
    width:100%; max-width:380px;
    padding:48px 40px;
    background: var(--dark2);
    border:1px solid var(--border);
    border-radius:4px;
    position:relative;
    overflow:hidden;
  }

  .auth-box::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:3px;
    background: var(--green);
  }

  .auth-logo {
    text-align:center;
    margin-bottom:36px;
  }

  .auth-logo .ball { font-size:42px; display:block; margin-bottom:8px; }

  .auth-logo h1 {
    font-family:'Barlow Condensed', sans-serif;
    font-size:28px; font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    color: var(--green);
  }

  .auth-logo span { color: var(--text-muted); font-size:12px; letter-spacing:3px; text-transform:uppercase; }

  .auth-tabs {
    display:flex; gap:0; margin-bottom:28px;
    border-bottom:1px solid var(--border);
  }

  .auth-tab {
    flex:1; padding:10px; text-align:center;
    background:none; border:none; color: var(--text-muted);
    font-family:'Barlow Condensed',sans-serif; font-size:15px;
    font-weight:600; letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; border-bottom:2px solid transparent;
    margin-bottom:-1px; transition:all .2s;
  }

  .auth-tab.active { color:var(--green); border-bottom-color:var(--green); }

  .field-group { margin-bottom:16px; }

  .field-group label {
    display:block; font-size:11px; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:6px;
  }

  .field-group input {
    width:100%; padding:12px 14px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:3px; color:var(--text);
    font-family:'Barlow',sans-serif; font-size:15px;
    outline:none; transition:border-color .2s;
  }

  .field-group input:focus { border-color:var(--green); }

  .btn-primary {
    width:100%; padding:14px;
    background:var(--green); border:none;
    color:#000; font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer;
    border-radius:3px; transition:background .2s;
    margin-top:8px;
  }

  .btn-primary:hover { background:var(--green-dim); }

  .auth-error {
    color:var(--danger); font-size:13px;
    text-align:center; margin-top:12px; display:none;
  }

  /* APP */
  #app { display:none; position:relative; z-index:1; }

  /* TOP NAV */
  .topnav {
    position:fixed; top:0; left:0; right:0; z-index:50;
    height:56px; background:rgba(10,15,13,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
  }

  .topnav-logo {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; color:var(--green);
    display:flex; align-items:center; gap:8px;
  }

  .topnav-user {
    display:flex; align-items:center; gap:12px;
  }

  .user-badge {
    width:34px; height:34px; border-radius:50%;
    background:var(--green); display:flex; align-items:center;
    justify-content:center; font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:800; color:#000; cursor:pointer;
  }

  .btn-logout {
    padding:6px 14px; background:none;
    border:1px solid var(--border); border-radius:3px;
    color:var(--text-muted); font-size:12px; font-family:'Barlow',sans-serif;
    cursor:pointer; transition:all .2s; letter-spacing:1px;
  }

  .btn-logout:hover { border-color:var(--danger); color:var(--danger); }

  /* BOTTOM NAV */
  .botnav {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    height:60px; background:rgba(10,15,13,0.97);
    border-top:1px solid var(--border);
    display:flex; align-items:stretch;
  }

  .botnav-item {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px;
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; transition:all .2s; font-family:'Barlow',sans-serif;
    position:relative;
  }

  .botnav-item.active { color:var(--green); }

  .botnav-item.active::before {
    content:'';
    position:absolute; top:0; left:20%; right:20%; height:2px;
    background:var(--green); border-radius:0 0 2px 2px;
  }

  .botnav-item span:first-child { font-size:20px; }
  .botnav-item span:last-child { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }

  /* PAGES */
  .page {
    display:none; padding:72px 16px 76px;
    max-width:700px; margin:0 auto;
    min-height:100vh;
  }

  .page.active { display:block; }

  .page-header {
    margin-bottom:24px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }

  .page-header h2 {
    font-family:'Barlow Condensed',sans-serif;
    font-size:30px; font-weight:800;
    text-transform:uppercase; letter-spacing:2px;
  }

  .page-header p { color:var(--text-muted); font-size:14px; margin-top:4px; }

  /* MATCHS */
  .match-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:4px; padding:20px;
    margin-bottom:12px; position:relative; overflow:hidden;
    transition:border-color .2s;
  }

  .match-card:hover { border-color:rgba(0,200,83,0.35); }

  .match-card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--green);
  }

  .match-vs {
    display:flex; align-items:center; justify-content:center;
    gap:16px; margin-bottom:12px;
  }

  .team-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px; font-weight:800;
    text-transform:uppercase; letter-spacing:1px;
    flex:1;
  }

  .team-name.home { text-align:right; color:var(--green); }
  .team-name.away { color:var(--text-muted); }

  .vs-badge {
    background:var(--dark3); padding:6px 12px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700; color:var(--text-muted);
    letter-spacing:2px; border-radius:2px;
  }

  .match-meta {
    display:flex; gap:16px; flex-wrap:wrap;
    font-size:13px; color:var(--text-muted);
  }

  .match-meta span { display:flex; align-items:center; gap:5px; }

  .match-actions {
    display:flex; gap:8px; margin-top:14px;
  }

  .btn-presence {
    padding:8px 16px; border-radius:3px; border:1px solid;
    font-family:'Barlow Condensed',sans-serif; font-size:13px;
    font-weight:700; letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition:all .2s;
  }

  .btn-present {
    border-color:var(--green); color:var(--green); background:none;
  }

  .btn-present:hover, .btn-present.active {
    background:var(--green); color:#000;
  }

  .btn-absent {
    border-color:var(--danger); color:var(--danger); background:none;
  }

  .btn-absent:hover, .btn-absent.active {
    background:var(--danger); color:#fff;
  }

  .presence-count {
    margin-left:auto; display:flex; align-items:center;
    gap:6px; font-size:13px; color:var(--text-muted);
  }

  .presence-dot { width:8px; height:8px; border-radius:50%; background:var(--green); }

  /* ADD MATCH FORM */
  .add-form {
    background:var(--card); border:1px solid var(--border);
    border-radius:4px; padding:20px; margin-bottom:20px;
  }

  .add-form h3 {
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:700; text-transform:uppercase;
    letter-spacing:1px; margin-bottom:16px; color:var(--green);
  }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .form-group { margin-bottom:12px; }

  .form-group label {
    display:block; font-size:11px; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:5px;
  }

  .form-group input {
    width:100%; padding:10px 12px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:3px; color:var(--text);
    font-family:'Barlow',sans-serif; font-size:14px; outline:none;
    transition:border-color .2s;
  }

  .form-group input:focus { border-color:var(--green); }

  .btn-add {
    padding:10px 24px; background:var(--green);
    border:none; color:#000; font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; border-radius:3px;
    transition:background .2s;
  }

  .btn-add:hover { background:var(--green-dim); }

  /* CHAT */
  .chat-wrap {
    display:flex; flex-direction:column;
    height:calc(100vh - 132px);
    background:var(--card); border:1px solid var(--border);
    border-radius:4px; overflow:hidden;
  }

  .chat-messages {
    flex:1; overflow-y:auto; padding:16px;
    display:flex; flex-direction:column; gap:10px;
    scroll-behavior:smooth;
  }

  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-track { background:transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-row {
    display:flex; gap:8px; align-items:flex-end;
    animation:msgIn .25s ease;
  }

  @keyframes msgIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .msg-row.mine { flex-direction:row-reverse; }

  .msg-avatar {
    width:28px; height:28px; border-radius:50%;
    background:var(--green); display:flex; align-items:center;
    justify-content:center; font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:800; color:#000;
    flex-shrink:0;
  }

  .msg-bubble {
    max-width:72%; padding:10px 14px;
    border-radius:14px; font-size:14px; line-height:1.5;
    position:relative;
  }

  .msg-row:not(.mine) .msg-bubble {
    background:var(--dark3); border:1px solid var(--border);
    border-bottom-left-radius:4px;
  }

  .msg-row.mine .msg-bubble {
    background:var(--green); color:#000;
    border-bottom-right-radius:4px;
  }

  .msg-sender {
    font-size:10px; font-weight:600; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:3px;
    color:var(--text-muted);
  }

  .msg-row.mine .msg-sender { display:none; }

  .msg-time {
    font-size:10px; color:rgba(0,0,0,0.5); margin-top:3px;
    text-align:right;
  }

  .msg-row:not(.mine) .msg-time { color:var(--text-muted); text-align:left; }

  .chat-input-wrap {
    padding:12px 16px;
    border-top:1px solid var(--border);
    display:flex; gap:10px; align-items:center;
    background:var(--dark2);
  }

  .chat-input {
    flex:1; padding:12px 16px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:24px; color:var(--text);
    font-family:'Barlow',sans-serif; font-size:15px;
    outline:none; transition:border-color .2s;
  }

  .chat-input:focus { border-color:var(--green); }

  .btn-send {
    width:44px; height:44px; border-radius:50%;
    background:var(--green); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; transition:background .2s; flex-shrink:0;
  }

  .btn-send:hover { background:var(--green-dim); }

  /* PRESENCES PAGE */
  .presence-list { display:flex; flex-direction:column; gap:8px; }

  .presence-item {
    background:var(--card); border:1px solid var(--border);
    border-radius:4px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
  }

  .presence-avatar {
    width:38px; height:38px; border-radius:50%;
    background:var(--dark3); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Barlow Condensed',sans-serif; font-size:15px;
    font-weight:800; color:var(--text-muted); flex-shrink:0;
  }

  .presence-info { flex:1; }

  .presence-info strong {
    display:block; font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.5px;
  }

  .presence-info small { color:var(--text-muted); font-size:12px; }

  .status-badge {
    padding:4px 10px; border-radius:2px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase;
  }

  .status-present { background:rgba(0,200,83,0.15); color:var(--green); }
  .status-absent { background:rgba(255,68,68,0.15); color:var(--danger); }
  .status-pending { background:rgba(255,214,0,0.1); color:var(--yellow); }

  /* MATCH SELECTOR */
  .match-selector {
    display:flex; gap:8px; margin-bottom:16px;
    overflow-x:auto; padding-bottom:4px;
  }

  .match-chip {
    padding:7px 14px; border-radius:20px;
    border:1px solid var(--border); background:none;
    color:var(--text-muted); font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:600; letter-spacing:1px;
    text-transform:uppercase; cursor:pointer; white-space:nowrap;
    transition:all .2s; flex-shrink:0;
  }

  .match-chip.active {
    background:var(--green); border-color:var(--green); color:#000;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align:center; padding:48px 24px; color:var(--text-muted);
  }

  .empty-state div { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:15px; }

  /* LOADING */
  .loading {
    display:flex; align-items:center; justify-content:center;
    padding:32px; color:var(--text-muted); gap:10px;
  }

  .spinner {
    width:18px; height:18px; border:2px solid var(--border);
    border-top-color:var(--green); border-radius:50%;
    animation:spin .7s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  /* TOAST */
  .toast {
    position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--dark2); border:1px solid var(--green);
    color:var(--text); padding:10px 20px; border-radius:4px;
    font-size:13px; font-family:'Barlow',sans-serif;
    opacity:0; transition:all .3s; pointer-events:none; z-index:200;
    white-space:nowrap;
  }

  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SECTION TOGGLE */
  .collapsible-header {
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; margin-bottom:12px; user-select:none;
  }

  .collapsible-header h3 {
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700; text-transform:uppercase;
    letter-spacing:1.5px; color:var(--text-muted);
  }

  .toggle-icon { color:var(--text-muted); font-size:14px; transition:transform .2s; }
  .toggle-icon.open { transform:rotate(180deg); }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="ball">⚽</span>
      <h1>MonEquipeFoot</h1>
      <span>Espace équipe</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
    </div>
    <div id="tab-login">
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com">
      </div>
      <div class="field-group">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">Se connecter</button>
    </div>
    <div id="tab-register" style="display:none">
      <div class="field-group">
        <label>Nom complet</label>
        <input type="text" id="reg-name" placeholder="Prénom Nom">
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ton@email.com">
      </div>
      <div class="field-group">
        <label>Mot de passe</label>
        <input type="password" id="reg-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-primary" onclick="doRegister()">Créer mon compte</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="topnav-logo">⚽ MonEquipeFoot</div>
    <div class="topnav-user">
      <div class="user-badge" id="user-badge">?</div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </nav>

  <!-- MATCHS PAGE -->
  <div class="page active" id="page-matchs">
    <div class="page-header">
      <h2>⚽ Matchs</h2>
      <p>Calendrier et gestion des rencontres</p>
    </div>

    <!-- ADD MATCH -->
    <div class="add-form">
      <div class="collapsible-header" onclick="toggleAddForm()">
        <h3>+ Ajouter un match</h3>
        <span class="toggle-icon" id="add-icon">▼</span>
      </div>
      <div id="add-match-form" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label>Équipe adverse</label>
            <input type="text" id="m-opponent" placeholder="FC Rival">
          </div>
          <div class="form-group">
            <label>Lieu</label>
            <input type="text" id="m-location" placeholder="Stade municipal">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date & heure</label>
            <input type="datetime-local" id="m-date">
          </div>
          <div class="form-group">
            <label>Nom équipe</label>
            <input type="text" id="m-team" placeholder="Mon équipe" value="MonEquipeFoot">
          </div>
        </div>
        <button class="btn-add" onclick="addMatch()">Enregistrer</button>
      </div>
    </div>

    <div id="matchs-list"><div class="loading"><div class="spinner"></div> Chargement...</div></div>
  </div>

  <!-- PRESENCES PAGE -->
  <div class="page" id="page-presences">
    <div class="page-header">
      <h2>📋 Présences</h2>
      <p>Qui est disponible pour le prochain match ?</p>
    </div>
    <div class="match-selector" id="match-chips"></div>
    <div id="presences-list"><div class="empty-state"><div>📅</div><p>Sélectionne un match</p></div></div>
  </div>

  <!-- CHAT PAGE -->
  <div class="page" id="page-chat">
    <div class="page-header">
      <h2>💬 Chat équipe</h2>
      <p>Messages en temps réel</p>
    </div>
    <div class="chat-wrap">
      <div class="chat-messages" id="chat-messages">
        <div class="loading"><div class="spinner"></div> Chargement des messages...</div>
      </div>
      <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chat-input"
          placeholder="Envoie un message à l'équipe..."
          onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="botnav">
    <button class="botnav-item active" id="nav-matchs" onclick="showPage('matchs')">
      <span>⚽</span><span>Matchs</span>
    </button>
    <button class="botnav-item" id="nav-presences" onclick="showPage('presences')">
      <span>📋</span><span>Présences</span>
    </button>
    <button class="botnav-item" id="nav-chat" onclick="showPage('chat')">
      <span>💬</span><span>Chat</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, setDoc, getDoc, query, orderBy, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCqlfu7mFTtN9CM77CNDbNLh6k8reamq0E",
  authDomain: "monequipefoot-2e530.firebaseapp.com",
  projectId: "monequipefoot-2e530",
  storageBucket: "monequipefoot-2e530.firebasestorage.app",
  messagingSenderId: "950469671233",
  appId: "1:950469671233:web:9b4cdc09377b98be56c9c0",
  measurementId: "G-R8DRH315R0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chatUnsubscribe = null;
let selectedMatchId = null;
let allMatchs = [];

// ─── AUTH STATE ───────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const initials = (user.displayName || user.email).slice(0,2).toUpperCase();
    document.getElementById('user-badge').textContent = initials;
    loadMatchs();
    listenChat();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if (chatUnsubscribe) chatUnsubscribe();
  }
});

// ─── AUTH ACTIONS ─────────────────────────────────────────
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showAuthError(friendlyError(e.code));
  }
};

window.doRegister = async () => {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name) { showAuthError('Entre ton nom'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      display_name: name,
      email: email,
      photo_url: ''
    });
  } catch(e) {
    showAuthError(friendlyError(e.code));
  }
};

window.doLogout = async () => {
  await signOut(auth);
};

function friendlyError(code) {
  if (code === 'auth/invalid-email') return 'Email invalide';
  if (code === 'auth/wrong-password' || code === 'auth/invalid-credential') return 'Email ou mot de passe incorrect';
  if (code === 'auth/email-already-in-use') return 'Cet email est déjà utilisé';
  if (code === 'auth/weak-password') return 'Mot de passe trop court (6 car. min)';
  if (code === 'auth/user-not-found') return 'Aucun compte avec cet email';
  return 'Une erreur est survenue';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ─── MATCHS ───────────────────────────────────────────────
async function loadMatchs() {
  const q = query(collection(db, 'matchs'), orderBy('date', 'desc'));
  onSnapshot(q, (snap) => {
    allMatchs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMatchs();
    renderMatchChips();
  });
}

function renderMatchs() {
  const el = document.getElementById('matchs-list');
  if (!allMatchs.length) {
    el.innerHTML = '<div class="empty-state"><div>📅</div><p>Aucun match programmé</p></div>';
    return;
  }
  el.innerHTML = allMatchs.map(m => {
    const dateStr = m.date ? formatDate(m.date.toDate ? m.date.toDate() : new Date(m.date)) : '—';
    return `
    <div class="match-card">
      <div class="match-vs">
        <div class="team-name home">${m.teamName || 'Mon équipe'}</div>
        <div class="vs-badge">VS</div>
        <div class="team-name away">${m.opponent || '?'}</div>
      </div>
      <div class="match-meta">
        <span>📅 ${dateStr}</span>
        ${m.location ? `<span>📍 ${m.location}</span>` : ''}
      </div>
      <div class="match-actions">
        <button class="btn-presence btn-present" id="btn-p-${m.id}" onclick="setPresence('${m.id}','present')">✓ Présent</button>
        <button class="btn-presence btn-absent" id="btn-a-${m.id}" onclick="setPresence('${m.id}','absent')">✗ Absent</button>
        <div class="presence-count" id="pc-${m.id}"><div class="presence-dot"></div> —</div>
      </div>
    </div>`;
  }).join('');
  allMatchs.forEach(m => {
    loadPresenceCount(m.id);
    loadMyPresence(m.id);
  });
}

window.addMatch = async () => {
  const opponent = document.getElementById('m-opponent').value.trim();
  const location = document.getElementById('m-location').value.trim();
  const dateVal = document.getElementById('m-date').value;
  const teamName = document.getElementById('m-team').value.trim();
  if (!opponent || !dateVal) { showToast('Remplis au moins l\'adversaire et la date'); return; }
  try {
    await addDoc(collection(db, 'matchs'), {
      teamName: teamName || 'MonEquipeFoot',
      opponent,
      location,
      date: Timestamp.fromDate(new Date(dateVal))
    });
    document.getElementById('m-opponent').value = '';
    document.getElementById('m-location').value = '';
    document.getElementById('m-date').value = '';
    showToast('Match ajouté ✓');
    toggleAddForm(true);
  } catch(e) { showToast('Erreur: ' + e.message); }
};

window.toggleAddForm = (forceClose) => {
  const form = document.getElementById('add-match-form');
  const icon = document.getElementById('add-icon');
  const open = form.style.display === 'none';
  if (forceClose) { form.style.display = 'none'; icon.classList.remove('open'); return; }
  form.style.display = open ? 'block' : 'none';
  icon.classList.toggle('open', open);
};

// ─── PRESENCES ────────────────────────────────────────────
window.setPresence = async (matchId, status) => {
  if (!currentUser) return;
  const ref = doc(db, 'presences', `${currentUser.uid}_${matchId}`);
  await setDoc(ref, {
    matchId,
    userId: currentUser.uid,
    status,
    timestamp: serverTimestamp()
  });
  // Update UI
  const pb = document.getElementById(`btn-p-${matchId}`);
  const ab = document.getElementById(`btn-a-${matchId}`);
  if (pb) { pb.classList.toggle('active', status === 'present'); }
  if (ab) { ab.classList.toggle('active', status === 'absent'); }
  loadPresenceCount(matchId);
  loadPresencesForMatch(matchId);
  showToast(status === 'present' ? '✓ Présence confirmée' : '✗ Absence enregistrée');
};

async function loadMyPresence(matchId) {
  if (!currentUser) return;
  const ref = doc(db, 'presences', `${currentUser.uid}_${matchId}`);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const s = snap.data().status;
    const pb = document.getElementById(`btn-p-${matchId}`);
    const ab = document.getElementById(`btn-a-${matchId}`);
    if (pb) pb.classList.toggle('active', s === 'present');
    if (ab) ab.classList.toggle('active', s === 'absent');
  }
}

async function loadPresenceCount(matchId) {
  const q = query(collection(db, 'presences'));
  const snap = await getDocs(q);
  const presents = snap.docs.filter(d => d.data().matchId === matchId && d.data().status === 'present').length;
  const el = document.getElementById(`pc-${matchId}`);
  if (el) el.innerHTML = `<div class="presence-dot"></div> ${presents} présent${presents > 1 ? 's' : ''}`;
}

function renderMatchChips() {
  const el = document.getElementById('match-chips');
  if (!allMatchs.length) { el.innerHTML = '<span style="color:var(--text-muted);font-size:13px">Aucun match</span>'; return; }
  el.innerHTML = allMatchs.map(m => `
    <button class="match-chip ${selectedMatchId === m.id ? 'active' : ''}"
      onclick="selectMatch('${m.id}')">
      vs ${m.opponent || '?'}
    </button>`).join('');
  if (!selectedMatchId && allMatchs.length) {
    selectMatch(allMatchs[0].id);
  }
}

window.selectMatch = (matchId) => {
  selectedMatchId = matchId;
  renderMatchChips();
  loadPresencesForMatch(matchId);
};

async function loadPresencesForMatch(matchId) {
  const el = document.getElementById('presences-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Chargement...</div>';
  const snap = await getDocs(collection(db, 'presences'));
  const entries = snap.docs.filter(d => d.data().matchId === matchId).map(d => d.data());

  // Fetch user names
  const usersSnap = await getDocs(collection(db, 'users'));
  const usersMap = {};
  usersSnap.docs.forEach(d => { usersMap[d.id] = d.data(); });

  if (!entries.length) {
    el.innerHTML = '<div class="empty-state"><div>🤷</div><p>Aucune réponse pour ce match</p></div>';
    return;
  }

  el.innerHTML = '<div class="presence-list">' + entries.map(e => {
    const u = usersMap[e.userId] || {};
    const name = u.display_name || e.userId.slice(0,8);
    const initials = name.slice(0,2).toUpperCase();
    const badgeClass = e.status === 'present' ? 'status-present' : e.status === 'absent' ? 'status-absent' : 'status-pending';
    const badgeText = e.status === 'present' ? 'Présent' : e.status === 'absent' ? 'Absent' : 'En attente';
    return `
    <div class="presence-item">
      <div class="presence-avatar">${initials}</div>
      <div class="presence-info">
        <strong>${name}</strong>
        <small>${u.email || ''}</small>
      </div>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
    </div>`;
  }).join('') + '</div>';
}

// ─── CHAT ─────────────────────────────────────────────────
function listenChat() {
  const q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'));
  chatUnsubscribe = onSnapshot(q, (snap) => {
    const el = document.getElementById('chat-messages');
    if (snap.empty) {
      el.innerHTML = '<div class="empty-state"><div>💬</div><p>Soyez les premiers à écrire !</p></div>';
      return;
    }
    el.innerHTML = snap.docs.map(d => {
      const msg = d.data();
      const mine = msg.senderId === currentUser?.uid;
      const initials = (msg.senderName || 'U').slice(0,2).toUpperCase();
      const time = msg.timestamp ? formatTime(msg.timestamp.toDate()) : '';
      return `
      <div class="msg-row ${mine ? 'mine' : ''}">
        ${!mine ? `<div class="msg-avatar">${initials}</div>` : ''}
        <div class="msg-bubble">
          ${!mine ? `<div class="msg-sender">${msg.senderName || 'Joueur'}</div>` : ''}
          ${escapeHtml(msg.text)}
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

window.sendMessage = async () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  input.value = '';
  try {
    await addDoc(collection(db, 'messages'), {
      text,
      senderId: currentUser.uid,
      senderName: currentUser.displayName || currentUser.email.split('@')[0],
      timestamp: serverTimestamp()
    });
  } catch(e) { showToast('Erreur envoi'); }
};

// ─── NAV ──────────────────────────────────────────────────
window.showPage = (name) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.botnav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'chat') {
    setTimeout(() => {
      const el = document.getElementById('chat-messages');
      el.scrollTop = el.scrollHeight;
    }, 100);
  }
  if (name === 'presences') renderMatchChips();
};

window.switchTab = (tab) => {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('auth-error').style.display = 'none';
};

// ─── HELPERS ──────────────────────────────────────────────
function formatDate(d) {
  return d.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function formatTime(d) {
  return d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
